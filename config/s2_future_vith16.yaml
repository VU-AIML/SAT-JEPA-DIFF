data:
  batch_size: 8               # Increased for better gradient stability with ViT-Base
  color_jitter_strength: 0.0
  crop_scale: [0.3, 1.0]
  crop_size: 128
  num_workers: 0
  pin_mem: true
  root_path: /path/to/downloads(the dataset)
  image_folder: null
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false

mask:
  allow_overlap: true
  aspect_ratio: [0.75, 1.5]
  enc_mask_scale: [0.7, 1.0]
  min_keep: 6
  num_enc_masks: 1
  num_pred_masks: 1
  patch_size: 8                # Kept at 8 for high-resolution satellite details
  pred_mask_scale: [0.2, 0.5] # Increased mask scale to make prediction task harder/more robust

meta:
  model_name: vit_base         # Switched to ViT-Base to prevent collapse and allow larger batch
  hf_token: "YOUR_HF_TOKEN"
  pred_depth: 6            
  pred_emb_dim: 384
  target_emb_dim: 64 
  use_bfloat16: true
  load_checkpoint: false 
  read_checkpoint: null
  copy_data: false
  enable_ijepa: true   # DEFAULT TRUE        # Set false to disable IJEPA training (only SD trains)
  use_lora: true        
  lora_rank: 8         
  lora_alpha: 16        
  ssim_weight: 0.1   
  ijepa_cosine_weight: 2.0     
  ijepa_variance_weight: 0.5    
  ijepa_feature_weight: 0.5     
  ijepa_contrastive_weight: 0.5 
  sd_loss_weight: 1.0           
  img2img_strength: 0.5 
  ijepa_spatial_weight: 2.0
  ijepa_diversity_weight: 1.0

optimization:
  ema: [0.999, 1.0]            # Higher starting EMA for slower/more stable target updates
  epochs: 100
  start_lr: 0.00002            # Significantly lowered to stabilize initial training
  lr: 0.0001                  # Reference learning rate adjusted for small batch/small model
  final_lr: 1.0e-06
  warmup: 1                   # Reduced warmup epochs as LR is already conservative
  weight_decay: 0.04
  final_weight_decay: 0.4
  ipe_scale: 1.0
        
logging:
  folder:  YOUR_SAVE_FOLDER
  write_tag: s2_future_jepa
  sd_vis_interval: 5
  vis_interval_iters: 500

